<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Order Exporter - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <header class="header">
      <div class="header-content">
        <div class="header-left">
          <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF9900" stroke-width="2.5">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          </div>
          <div>
            <h1>Category Settings</h1>
            <p class="subtitle">Configure item categories for your order exports</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="btnResetDefaults" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M3 21v-5h5"/>
            </svg>
            Reset to Defaults
          </button>
          <button id="btnAddCategory" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Category
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <div id="categoryList" class="category-list">
        <!-- Categories rendered dynamically -->
      </div>

      <div id="saveIndicator" class="save-indicator hidden">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Saved
      </div>
    </main>

    <footer class="options-footer">
      <a id="btnMerge" class="footer-link" title="Merge reports from multiple accounts">Merge Reports</a>
      <span class="version-label" id="versionLabel">v1.5.0</span>
    </footer>
  </div>

  <script src="categories.js"></script>
  <script src="options.js"></script>
</body>
</html>
